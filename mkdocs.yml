site_name: ActivityHub Demo
site_description: Personalized activity matching for Yerevan (DS223 group project)
site_author: Group 3, AUA Spring 2026
site_url: https://ds-223-2026-spring.github.io/ds223-3-project/
repo_url: https://github.com/DS-223-2026-Spring/ds223-3-project
repo_name: DS-223-2026-Spring/ds223-3-project

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Database: database.md
  - API: api.md
  - Frontend: frontend.md
  - Data Science: ds.md
  - Orchestration: orchestration.md
  - Visual Analytics Guide: visual-analytics-guide.md


theme:
  name: material
  logo: imgs/activityhub_logo.png
  favicon: imgs/activityhub_logo.png
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
      primary: teal
      accent: purple
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
      primary: teal
      accent: lime

plugins:
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
