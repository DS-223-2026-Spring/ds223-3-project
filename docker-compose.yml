services:
  db:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./activityhub/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: activityhub
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d activityhub"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - activityhub

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    depends_on:
      - db
    networks:
      - activityhub

  api:
    build: ./activityhub/api
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-activityhub}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
    volumes:
      - ./activityhub/shared:/app/shared
      - ./activityhub/ds/models:/app/ds/models
    depends_on:
      db:
        condition: service_healthy
    networks:
      - activityhub

  app:
    build: ./activityhub/app
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    networks:
      - activityhub

  etl:
    build: ./activityhub/etl
    volumes:
      - ./activityhub/ds:/app/ds
      - ./activityhub/shared:/app/shared
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
      DB_NAME: ${DB_NAME:-activityhub}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - activityhub

volumes:
  postgres_data:

networks:
  activityhub:
    driver: bridge