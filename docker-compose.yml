services:
  db:
    image: postgres:15
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: activityhub
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    networks:
      - activityhub

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - db
    networks:
      - activityhub

  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - activityhub

  app:
    build: ./app
    ports:
      - "8501:8501"
    depends_on:
      - api
    networks:
      - activityhub

  model:
    build: ./model
    depends_on:
      - db
    networks:
      - activityhub

  etl:
    build: ./etl
    depends_on:
      - db
    networks:
      - activityhub

volumes:
  postgres_data:

networks:
  activityhub:
    driver: bridge